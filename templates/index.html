<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon TCG - Lagerkollen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #16213e;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }
        .header h1 { font-size: 24px; color: #e94560; }
        .header p { font-size: 14px; color: #888; margin-top: 5px; }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.4;
            font-size: 14px;
        }
        .user {
            background: #0f3460;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot {
            background: #16213e;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .bot .product {
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }
        .bot .product:last-child { border-bottom: none; }
        .bot .product .name { font-weight: 600; color: #e94560; }
        .bot .product .price { color: #4ade80; }
        .bot .product .store { color: #888; font-size: 12px; }
        .bot .product .link a { color: #60a5fa; font-size: 12px; }
        .bot em { color: #888; }
        .input-area {
            background: #16213e;
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 15px;
            outline: none;
        }
        .input-area input:focus { border-color: #e94560; }
        .input-area button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }
        .input-area button:hover { background: #d63851; }
        .typing { color: #666; font-style: italic; padding: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔥 Pokémon TCG — Lagerkollen</h1>
        <p>Skriv en produkt för att kolla lagersaldo i 40+ svenska butiker</p>
    </div>
    <div class="chat-container" id="chat">
        <div class="message bot">
            👋 Hej! Skriv vad du söker efter, t.ex. "Pitch Black ETB" eller "151 booster bundle" eller "Prismatic Evolutions". Jag kollar alla butiker!
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="input" placeholder="Sök produkt..." autofocus>
        <button onclick="search()">Sök</button>
    </div>

    <script>
        const input = document.getElementById('input');
        const chat = document.getElementById('chat');

        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') search(); });

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = 'message ' + (isUser ? 'user' : 'bot');
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function formatPrice(price) {
            if (!price) return '';
            return price;
        }

        async function search() {
            const q = input.value.trim();
            if (!q) return;
            
            addMessage(q, true);
            input.value = '';
            
            // Visa "letar..."
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.textContent = '🔍 Letar...';
            chat.appendChild(typing);
            
            try {
                const res = await fetch('/sok?q=' + encodeURIComponent(q));
                const products = await res.json();
                
                typing.remove();
                
                if (products.length === 0) {
                    addMessage('😕 Hittade inget för "' + q + '". Försök med andra ord!', false);
                    return;
                }
                
                let inStock = products.filter(p => p.status === '✅');
                let outOfStock = products.filter(p => p.status !== '✅');
                
                let html = '';
                
                if (inStock.length > 0) {
                    html += '<strong>✅ I LAGER (' + inStock.length + '):</strong><br>';
                    inStock.forEach(p => {
                        html += '<div class="product">';
                        html += '<div class="name">🟢 ' + p.title + '</div>';
                        html += '<div class="price">' + formatPrice(p.price) + '</div>';
                        html += '<div class="store">📍 ' + p.store + '</div>';
                        html += '<div class="link"><a href="' + p.url + '" target="_blank">🔗 Klicka här</a></div>';
                        html += '</div>';
                    });
                }
                
                if (outOfStock.length > 0) {
                    html += '<br><strong>❌ SLUT (' + outOfStock.length + '):</strong><br>';
                    outOfStock.forEach(p => {
                        html += '<div class="product">';
                        html += '<div class="name" style="color:#888">🔴 ' + p.title + '</div>';
                        html += '<div class="store">📍 ' + p.store + '</div>';
                        html += '</div>';
                    });
                }
                
                addMessage(html, false);
            } catch (err) {
                typing.remove();
                addMessage('⚠️ Något gick fel. Försök igen!', false);
            }
        }
    </script>
</body>
</html>
